<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="utf-8">
        <title>Kodexempel 1</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <script type="text/javascript">
            "use strict";

            let names = [
                "Lars",
                "Erik",
                "Anders",
                "Johan",
                "Karl",
                "Per",
                "Nils",
                "Oskar",
                "Gustav",
                "Henrik",
                "Anna",
                "Eva",
                "Maria",
                "Karin",
                "Lena",
                "Sara",
                "Emma",
                "Elin",
                "Sofia",
                "Maja"
            ];


            console.log(names);
            names.sort();
            console.log(names);

            document.write("<ul>");
            for(let i = 0; i < names.length; i++){
                //document.write("<li>" + names[i] + "</li>");
            }

           
            names.forEach(function(name, index){
                document.write("<li>" + index + ":" + name + "</li>")
            });

            document.write("</ul>");

            for(let i = 0; i < names.length; i++){
                if(names[i] === "Gustav"){
                    //i == 8
                    names.splice(i, 1);
                }
            }

            console.log(names);

        </script>
    </body>
</html>
