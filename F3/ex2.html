<!doctype html>
<html lang="sv">
	<head>
        <meta charset="utf-8" /> 
        <title>JavaScript för webbutveckling ISGB15 -
			 Document Object Model
        </title>	
	</head>
	<body>
        <p data-id="1">1</p>
		<p data-id="2">2</p>
		<p data-id="3">3</p>
		<p data-id="4">4</p>
		<p>Ett</p>
		<p>Två</p>
		
		<div><p>Test</p></div>

		<script>
		
			'use strict';

			function searchDOM() {
				
				let bodyRef = document.querySelector( 'body' );
				let nbrOfBody = bodyRef.length;
				console.log( bodyRef, nbrOfBody );

				let pRefs = document.getElementsByTagName( 'p' );
				let nbrOfPs = pRefs.length;
				
				console.log( pRefs, nbrOfPs );

				for(let i = 0; i < pRefs.length; i++) {
					console.log(i, pRefs.item(i) );
				}
				
				pRefs = document.querySelectorAll( 'p[data-id]' );
				nbrOfPs = pRefs.length;
				
				console.log(pRefs, nbrOfPs );

				for(let j = 0; j < pRefs.length; j++) {
					console.log(j, pRefs.item(j) );
				}
				
			}
			
			searchDOM();
			
		</script>
		
    </body>
</html>
