<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cube{
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: red;
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>
            Item 3 (parent)
            <ul>
                <li>Subitem 1 (child)</li>
                <li>Subitem 2 (child)</li>
                <li>Subitem 3 (child)</li>
                <li>
                    Subitem 4 (child, parent)

                    <ul>
                        <li id="fisk">Subitem 1 (child)</li>
                        <li>Subitem 2 (child)</li>
                    </ul>
                </li>
            </ul>
        </li>
    </ul>

    <a href="https://www.kau.se/" id="kau-link">kau.se</a>

    <div class="cube"></div>


    <script>
        window.addEventListener('load', ()=> {

            document.getElementById("fisk").addEventListener("click", fisk);
            document.querySelector('ul').addEventListener('click', fagel);

            window.addEventListener('mousemove', moveCube);


        });



        function fisk(e) {

            console.log("Target är: " + e.target.tagName);
            console.log("CurrentTarget är: " + e.currentTarget.tagName);
            console.log("Fisk!!!!");
            //e.stopPropagation();
        }

        function fagel(e) {
            
            console.log("Target är: " + e.target.tagName);
            console.log("CurrentTarget är: " + e.currentTarget.tagName);
            console.log("Fågel!");
        }

        function moveCube(e) {

            console.log('musens potition är: ' + e.clientX + ', ' + e.clientY);
            document.querySelector('.cube').style.left = e.clientX + 'px';
            document.querySelector('.cube').style.top = e.clientY + 'px';




        }
    </script>
</body>
</html>
